name: Download APK

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Run Downloader
        run: |
          cat <<EOF > Downloader.java
          import java.net.URI;
          import java.net.http.HttpClient;
          import java.net.http.HttpRequest;
          import java.net.http.HttpResponse;
          import java.nio.file.Files;
          import java.nio.file.Paths;

          public class Downloader {
              public static void main(String[] args) throws Exception {
                  var url = "https://d.apkpure.com/b/XAPK/jp.co.ponos.battlecats?versionCode=1504020&nc=arm64-v8a&sv=24";
                  var client = HttpClient.newHttpClient();
                  var request = HttpRequest.newBuilder().uri(URI.create(url)).build();
                  var response = client.send(request, HttpResponse.BodyHandlers.ofInputStream());
                  Files.copy(response.body(), Paths.get("battlecats.xapk"));
              }
          }
          EOF
          javac Downloader.java
          java Downloader.java
          
      - name: Commit APK
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add battlecats.xapk
          git commit -m "Download new APK"
          git push
