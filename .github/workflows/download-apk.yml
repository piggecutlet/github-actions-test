name: Download APK

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Run Downloader
        run: |
          cat <<EOF > Downloader.java
          import java.net.URI;
          import java.net.http.HttpClient;
          import java.net.http.HttpRequest;
          import java.net.http.HttpResponse;
          import java.nio.file.Files;
          import java.nio.file.StandardCopyOption;
          import java.nio.file.Paths;

          public class Downloader {
              public static void main(String[] args) throws Exception {
                  var url = "https://d.apkpure.com/b/XAPK/jp.co.ponos.battlecats?versionCode=1504020&nc=arm64-v8a&sv=24";
                  var client = HttpClient.newBuilder()
                          .followRedirects(HttpClient.Redirect.NORMAL)
                          .build();
                  var request = HttpRequest.newBuilder()
                          .uri(URI.create(url))
                          .header("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36")
                          .header("Referer", "https://apkpure.com/")
                          .build();
                  var response = client.send(request, HttpResponse.BodyHandlers.ofInputStream());
                  
                  if (response.statusCode() == 200) {
                      Files.copy(response.body(), Paths.get("battlecats.xapk"), StandardCopyOption.REPLACE_EXISTING);
                  } else {
                      System.err.println("Failed to download: " + response.statusCode());
                      System.exit(1);
                  }
              }
          }
          EOF
          javac Downloader.java
          java Downloader.java
          
      - name: Commit APK
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add battlecats.xapk
          git commit -m "Download new APK"
          git push
