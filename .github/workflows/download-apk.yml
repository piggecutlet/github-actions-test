name: Download APK

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        run: |
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
          -H "Referer: https://apkpure.com/" \
          "https://d.apkpure.com/b/XAPK/jp.co.ponos.battlecats?versionCode=1504020&nc=arm64-v8a&sv=24" \
          -o battlecats.xapk

      - name: Commit APK
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add battlecats.xapk
          git commit -m "Download new APK"
          git push
